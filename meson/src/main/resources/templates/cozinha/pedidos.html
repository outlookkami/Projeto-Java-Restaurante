<!DOCTYPE html>
<html lang="pt-BR" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/head :: head('Pedidos Cozinha')}"></th:block>
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/menu-lateral-cozinha :: menu-lateral}"></aside>

    <main class="content">
        <header class="header">
            <h1>Pedidos</h1>
        </header>
        <div class="cozinha">
            <div class="card-cozinha" th:each="pedido : ${pedidos}" th:if="${itensRestantes[pedido.id] > 0}">
                <div class="header-card">
                    <div class="header-mesa">
                        <span class="titulo-mesa">MESA</span>
                        <h3 th:text="${pedido.comanda.mesa.numero}" style="font-family: 'Playfair Display';"></h3>
                    </div>
                    <div class="header-info">
                        <span th:text="${#temporals.format(pedido.dataCriacao, 'HH:mm')}" style="color: #ccb8a5;"></span>
                        <strong th:text="'#' + ${pedido.numeroDia}"></strong>
                    </div>
                </div>
                <div class="conteudo-card">
                    <div class="item" th:each="itemPedido : ${pedido.itens}" th:if="${itemPedido}">
                        <div>
                            <strong th:text="${itemPedido.quantidade} + 'x ' + ${itemPedido.produto.nome}"></strong>
                        </div>

                        <form th:action="@{/cozinha/pedidos/item/{id}/status(id=${itemPedido.id})}" method="post" class="botoes">
                            <button type="submit" name="acao" value="INICIAR" class="btn-status iniciar" th:if="${itemPedido.statusItem.name() == 'ENVIADO'}">Iniciar</button>
                            <button type="submit" name="acao" value="FINALIZAR" class="btn-status preparando" th:if="${itemPedido.statusItem.name() == 'EM_PREPARO'}">Finalizar</button>
                        </form>
                    </div>
                </div>
                <hr>
                <div class="footer-card">
                    <span th:text="${itensRestantes[pedido.id]} + ' itens restantes'"></span>
                </div>
            </div>
        </div>
    </main>

</div>

<style>

.cozinha {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 2fr));
    gap: 20px;
}

.card-cozinha {
    display: flex;
    flex-direction: column;
    border: solid 1px transparent;
    border-radius: 20px;
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
}

.header-card {
    display: flex;
    background-color: #5c2f24;
    justify-content: space-between;
    align-items: center;
    padding: 5px;
}

.header-mesa {
    background-color: #5c2f24;
    color: #ffffff;
    padding: 5px;
    display: flex;
    flex-direction: column;
}

.header-info {
    color: #ffffff;
    display: flex;
    flex-direction: column;
    font-family: 'Inter';
}

.titulo-mesa {
    color: #ccb8a5;
    font-size: 14px;
    font-family: 'Dm Sans', 'Inter', Arial;
}

.conteudo-card {
    background-color: #ffffff;
    padding: 5px;
}

.item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 18px;
    margin-bottom: 7px;
}

.btn-status {
    border: none;
    border-radius: 5px;
    padding: 6px;
    cursor: pointer;
    font-size: 15px;
}

.iniciar {
    background-color: #f1f0ee;
    color: #696575;
}

.preparando, .iniciar:hover {
    background-color: #feedd5;
    color: #db7e00;
}

.preparando:hover{
    background-color: #D6FCE8;
    color: #148A58;
}

.footer-card {
    background-color: #fafaf9;
    color: #616a7d;
    text-align: center;
}
</style>
</body>
